<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect Focus Game</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            margin-bottom: 5px;
            color: #0d6efd; /* Bootstrap primary blue to match your site */
        }

        p {
            margin-bottom: 20px;
            color: #aaa;
        }

        /* The viewfinder container */
        #viewfinder {
            position: relative;
            width: 800px;
            height: 500px;
            border: 4px solid #333;
            border-radius: 8px;
            overflow: hidden;
            cursor: crosshair;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* The photography image */
        #target-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background-image: url('/assets/img/_DSC7267-HDR-Enhanced-NR.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(15px); /* Starts blurry */
            transition: filter 0.05s linear;
        }

        /* UI Overlays */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Lets clicks pass through to the image */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .crosshair-center {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            position: relative;
        }

        .crosshair-center::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 4px; height: 4px;
            background: red;
            border-radius: 50%;
        }

        #score-display {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
            height: 30px;
        }

        #controls {
            margin-top: 20px;
        }

        button {
            padding: 10px 25px;
            font-size: 16px;
            background-color: #0d6efd;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #0b5ed7;
        }
        
        button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <h1>Focus Puller</h1>
    <p>Click the image at the exact moment it comes into perfect focus.</p>

    <div id="viewfinder" onclick="takePhoto()">
        <div id="target-image"></div>
        <div id="ui-layer">
            <div class="crosshair-center"></div>
        </div>
    </div>

    <div id="score-display">Score: 0 / 100</div>

    <div id="controls">
        <button id="start-btn" onclick="startGame()">Start Focusing</button>
        <button onclick="window.location.href='fromscratch.html'">Back to Top Photo Shoots</button>
    </div>

    <script>
        const targetImage = document.getElementById('target-image');
        const scoreDisplay = document.getElementById('score-display');
        const startBtn = document.getElementById('start-btn');
        
        let isPlaying = false;
        let animationId;
        let currentBlur = 15;
        let blurDirection = -1; // -1 for getting sharper, 1 for getting blurrier
        let speed = 0.4; // How fast it shifts focus

        // Game loop to animate the CSS blur
        function animateFocus() {
            if (!isPlaying) return;

            currentBlur += (speed * blurDirection);

            // Reverse direction if it hits the extremes
            if (currentBlur <= 0) {
                currentBlur = 0;
                blurDirection = 1;
            } else if (currentBlur >= 15) {
                currentBlur = 15;
                blurDirection = -1;
            }

            // Apply the blur to the image
            targetImage.style.filter = `blur(${currentBlur}px)`;

            // Call the next frame
            animationId = requestAnimationFrame(animateFocus);
        }

        function startGame() {
            isPlaying = true;
            startBtn.disabled = true;
            scoreDisplay.innerText = "Focusing...";
            scoreDisplay.style.color = "white";
            
            // Randomize starting direction slightly
            blurDirection = Math.random() > 0.5 ? 1 : -1; 
            currentBlur = 15; // Reset to fully blurry

            cancelAnimationFrame(animationId);
            animateFocus();
        }

        function takePhoto() {
            if (!isPlaying) return; // Ignore clicks if game isn't running

            isPlaying = false; // Stop the loop
            cancelAnimationFrame(animationId);
            startBtn.disabled = false;
            startBtn.innerText = "Try Again";

            // Calculate score (0 blur is perfect)
            // If blur is 0, score is 100. If blur is 15, score is 0.
            let score = Math.max(0, Math.round(100 - (currentBlur * (100 / 15))));

            // Display results
            if (score >= 95) {
                scoreDisplay.innerText = `Incredible Shot! Score: ${score}/100`;
                scoreDisplay.style.color = "#28a745"; // Green
            } else if (score >= 75) {
                scoreDisplay.innerText = `Good Focus! Score: ${score}/100`;
                scoreDisplay.style.color = "#ffc107"; // Yellow
            } else {
                scoreDisplay.innerText = `Too Blurry. Score: ${score}/100`;
                scoreDisplay.style.color = "#dc3545"; // Red
            }
        }
    </script>
</body>
</html>
